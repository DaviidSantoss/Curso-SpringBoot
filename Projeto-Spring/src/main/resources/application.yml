spring:
  application:
    name: Projeto-Spring

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/projeto_spring?useTimezone=true&serverTimezone=UTC
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    org.apache: WARN
    com.zaxxer.hikari: WARN

    #Em produção recomenda-se usar log em nivel de WARN OU ERROR